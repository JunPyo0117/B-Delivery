name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Unit & Integration Tests
        run: npm run test

      - name: Type Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
